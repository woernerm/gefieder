# --- Gateway Connection ---
gateways:
  postgres:
    connection:
      # For more information on configuring the connection to your execution engine, visit:
      # https://sqlmesh.readthedocs.io/en/stable/reference/configuration/#connection
      # https://sqlmesh.readthedocs.io/en/stable/integrations/engines/postgres/#connection-options
      type: postgres
      # The variables below are set by the environment section of the sqlmesh service
      # in compose.yaml. The defaults allow running SQLMesh from the host as well.
      host: {{ env_var('POSTGRES_HOST', 'localhost') }}
      user: sqlmesh
      # The password of the "sqlmesh" database user, i.e. the value stored in the
      # sqlmesh_password podman secret. It is exported by entrypoint.sh from the
      # secret mounted into the container.
      password: {{ env_var('SQLMESH_PASSWORD') }}
      port: {{ env_var('POSTGRES_PORT', '5432') }}
      database: {{ env_var('POSTGRES_DB', 'postgres') }}
      # concurrent_tasks: 4
      # register_comments: True
      # pre_ping: True
      # pretty_sql: False
      # schema_differ_overrides: 
      # catalog_type_overrides: 
      # keepalives_idle: 
      # connect_timeout: 10
      # role: 
      # sslmode: 
      # application_name: 

default_gateway: postgres

# --- Model Defaults ---
# https://sqlmesh.readthedocs.io/en/stable/reference/model_configuration/#model-defaults

model_defaults:
  dialect: postgres
  start: 2026-06-10 # Start date for backfill history
  cron: '@daily'    # Run models daily at 12am UTC (can override per model)

# --- Linting Rules ---
# Enforce standards for your team
# https://sqlmesh.readthedocs.io/en/stable/guides/linter/

linter:
  enabled: true
  rules:
    - ambiguousorinvalidcolumn
    - invalidselectstarexpansion
    - noambiguousprojections
