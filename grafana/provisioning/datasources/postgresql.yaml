# Provisions the project's PostgreSQL database as a read-only Grafana data source.
# The password is read from the grafana_password secret mounted into the container.
apiVersion: 1

datasources:
  # The name and uid are interpolated from APP_NAME at build time by
  # grafana/render.sh, so they track the project name from buildtime.env.
  - name: ${APP_NAME}
    type: postgres
    uid: ${APP_NAME}-postgresql
    access: proxy
    url: postgresql:5432
    user: grafana
    isDefault: true
    jsonData:
      database: postgres
      sslmode: disable
      postgresVersion: 1600
    secureJsonData:
      password: $__file{/run/secrets/grafana_password}
