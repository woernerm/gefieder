# Provisions the dashboards shipped with the image. On startup, and while running, Grafana
# scans the folder below and loads every dashboard JSON it finds there.
apiVersion: 1

providers:
  - name: ${APP_NAME}
    type: file
    # Let users save changes without Grafana reverting them on the next scan; the files on
    # disk remain the defaults restored when the image is reinstalled.
    allowUiUpdates: true
    options:
      # The dashboards baked into the image by the Dockerfile's COPY of grafana/provisioning/.
      path: /etc/grafana/provisioning/dashboards
      # Derive each dashboard's folder from the directory it sits in, so the JSON under
      # dashboards/Default/ lands in a "Default" folder. This is done via the on-disk tree
      # rather than a static `folder:` key because, unlike that key, it also re-homes a
      # dashboard that a previous image version had provisioned into the root folder: on the
      # next scan Grafana moves it into the folder its directory implies. A JSON placed
      # directly in `path` (no subfolder) would instead land in the root "General" folder.
      foldersFromFilesStructure: true
