name: ${APP_NAME}

services:
  crudman:
    container_name: crudman
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./crudman/Dockerfile
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/' + os.environ['CRUDMAN_PATH'] + '/').read()\"" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      APP_NAME: ${APP_NAME}
      POSTGRES_HOST: postgresql
      POSTGRES_PORT: "5432"
      POSTGRES_DB: postgres
      POSTGRES_USER: crudman
      SUPERUSER_NAME: ${SUPERUSER_NAME:-admin}
      SUPERUSER_EMAIL: ${SUPERUSER_EMAIL:-}
      SERVER_NAME: ${SERVER_NAME:-localhost}
      DEBUG: ${DEBUG:-false}
      CRUDMAN_PATH: ${CRUDMAN_PATH:-crudman}
    secrets:
      - django_secret_key
      - crudman_password
      - superuser_password

  proxy:
    container_name: proxy
    restart: unless-stopped
    image: docker.io/library/nginx:alpine
    depends_on:
      crudman:
        condition: service_healthy
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DEBUG: ${DEBUG:-false}
      CRUDMAN_PATH: ${CRUDMAN_PATH:-crudman}
    volumes:
      - ./proxy:/etc/nginx/proxy:ro,z
    command: [ "sh", "/etc/nginx/proxy/entrypoint.sh" ]

  sqlmesh:
    container_name: sqlmesh
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./sqlmesh/Dockerfile
    depends_on:
      postgresql:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgresql
      POSTGRES_PORT: "5432"
      POSTGRES_DB: postgres
      SQLMESH_RUN_INTERVAL: "10"
    secrets:
      - sqlmesh_password

  postgresql:
    container_name: postgresql
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./postgresql/Dockerfile
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${SUPERUSER_NAME:-admin} -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${SUPERUSER_NAME:-admin}
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/superuser_password
    secrets:
      - superuser_password
      - crudman_password
      - sqlmesh_password

secrets:
  django_secret_key:
    external: true
  superuser_password:
    external: true
  crudman_password:
    external: true
  sqlmesh_password:
    external: true
