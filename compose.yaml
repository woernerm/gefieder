services:
  crudman:
    container_name: crudman
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./crudman/Dockerfile
    healthcheck:
      test: [ "CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/').read()\"" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: postgresql
      POSTGRES_PORT: "5432"
      POSTGRES_DB: postgres
      POSTGRES_USER: crudman
      POSTGRES_PASSWORD_FILE: /run/secrets/crudman_password
    secrets:
      - django_secret_key
      - crudman_password

  postgresql:
    container_name: postgresql
    restart: unless-stopped
    build:
      context: .
      dockerfile: ./postgresql/Dockerfile
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
      - crudman_password

secrets:
  django_secret_key:
    external: true
  postgres_password:
    external: true
  crudman_password:
    external: true
