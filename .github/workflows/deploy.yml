name: Deploy to server

# Manual trigger only.
on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (branch, tag or commit) to deploy"
        required: true
        default: main
      dry_run:
        description: "Run the test suite only, do not deploy"
        type: boolean
        default: false

jobs:
  # Pre-gate: run the full throwaway test suite on the ephemeral runner, which has no
  # production stack, so there is no collision with the live containers. If this fails
  # the deploy job never runs and production is never touched.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Install podman, podman-compose and uv
        run: |
          sudo apt-get update
          sudo apt-get install -y podman podman-compose
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Create the podman secrets
        run: |
          openssl rand -hex 64 | podman secret create django_secret_key -
          printf '%s' '${{ secrets.SUPERUSER_PASSWORD }}' | podman secret create superuser_password -
          openssl rand -hex 32 | podman secret create crudman_password -
          openssl rand -hex 32 | podman secret create sqlmesh_password -
          openssl rand -hex 32 | podman secret create grafana_password -

      - name: Run the test suite
        run: ./run-tests.sh production

  # Deploy on the server. Only runs if the test job passed and this is not a dry run.
  # The server-side scripts are invoked one per workflow step, so the GitHub Actions UI
  # shows exactly which stage (update, backup, deploy, smoke test) passes or fails. The
  # rollback step runs only if an earlier step failed.
  deploy:
    needs: test
    if: ${{ github.event.inputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    env:
      # Each step runs one server-side script from the repository root over SSH.
      # $REMOTE prefixes the "cd <repo> && " so every script runs in the right place;
      # the repository directory defaults to ~/gefieder (override with DEPLOY_DIR).
      REMOTE: ssh -i ~/.ssh/deploy_key ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} cd ${{ secrets.DEPLOY_DIR || '~/gefieder' }} &&
    steps:
      - name: Set up the SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Update the checkout
        run: $REMOTE ./deploy/update.sh '${{ github.event.inputs.ref }}'

      - name: Back up the database and images
        run: $REMOTE ./deploy/backup.sh

      - name: Deploy the new version
        run: $REMOTE ./deploy/deploy.sh

      - name: Smoke test the running system
        run: $REMOTE ./deploy/smoke-test.sh

      - name: Roll back on failure
        if: failure()
        run: $REMOTE ./deploy/rollback.sh

      - name: Clean up the SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
