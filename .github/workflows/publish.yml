name: Build and release

# Build the five custom images with docker, render the quadlets, and publish everything
# as a GitHub release: one tarball per image, one file per quadlet, plus install.sh.
# A server then installs it without a checkout via the curl one-liner in install.sh.
#
# Triggered by every commit to main; also runnable manually with an explicit tag.
on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to create (e.g. v1.2.0)"
        required: true

permissions:
  contents: write   # create the release and upload its assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # Pinned to a full commit SHA (v5.0.0) so a moved tag cannot change what runs.
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      # The release tag: the explicit one from a manual run, otherwise a unique tag
      # derived from the date and short commit SHA for the main-branch push.
      - name: Resolve the release tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "TAG=v$(date +%Y.%m.%d)-${GITHUB_SHA::7}" >> "$GITHUB_ENV"
          fi

      # Load the build-time settings so the build args and the rendered quadlets use the
      # same values. Only KEY=value lines go into $GITHUB_ENV; comments and blank lines in
      # buildtime.env would otherwise be rejected as invalid env entries. envsubst
      # (gettext) renders the quadlet templates below.
      - name: Load buildtime.env
        run: |
          grep -E '^[A-Z_][A-Z0-9_]*=' buildtime.env >> "$GITHUB_ENV"
          sudo apt-get update && sudo apt-get install -y gettext-base

      # The same script used for local builds, so CI and a developer build identically.
      # It reads buildtime.env itself and passes the proxy settings as --build-arg.
      - name: Build the images
        run: ./build.sh

      # Stage every release asset in dist/: one tarball per image (CLAUDE.md's "one file
      # per docker image"), one file per quadlet, the rendered manifest the installer
      # sources, and the installer itself.
      - name: Stage the release assets
        run: |
          mkdir -p dist
          for svc in postgresql crudman sqlmesh proxy grafana; do
            docker save "${REGISTRY}/${svc}:${IMAGE_TAG}" -o "dist/${svc}.tar"
          done

          # Render the quadlet templates and the server-stats systemd units, substituting
          # only the known tokens so nginx's $host and Grafana's %(domain)s are left
          # untouched. The units take ${APP_NAME} like the quadlets do.
          VARS='${REGISTRY} ${IMAGE_TAG} ${APP_NAME} ${SERVER_NAME} ${SUPERUSER_NAME} ${SUPERUSER_EMAIL} ${CRUDMAN_PATH} ${GRAFANA_PATH} ${DEBUG}'
          for f in quadlets/* serverstats/server-stats.service serverstats/server-stats.timer; do
            envsubst "$VARS" < "$f" > "dist/$(basename "$f")"
          done

          # The host-side collector and the default runtime config ship verbatim; the
          # installer drops them next to the rendered units.
          cp serverstats/collect.sh dist/collect.sh
          cp runtime.env dist/runtime.env

          # The installer sources this for the values baked into the images.
          {
            echo "APP_NAME=${APP_NAME}"
            echo "SUPERUSER_NAME=${SUPERUSER_NAME}"
            echo "CRUDMAN_PATH=${CRUDMAN_PATH}"
            echo "GRAFANA_PATH=${GRAFANA_PATH}"
            echo "SERVER_STATS_SCHEMA=${SERVER_STATS_SCHEMA}"
          } > dist/manifest.env

          # Bake the repository URL into the installer so the curl one-liner points at this
          # repository (github.com or an enterprise instance). Only ${REPO} is substituted;
          # the installer's own shell variables ($WORK, $BASE, ...) are left untouched.
          envsubst '${REPO}' < install.sh > dist/install.sh

      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$TAG" dist/* --title "$TAG" --generate-notes
